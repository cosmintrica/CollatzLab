<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collatz Lab</title>
    <meta name="theme-color" content="#f3e4ca" />
    <meta name="description" content="Local-first Collatz research platform with live math, evidence tracking, and guarded source review." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      (function () {
        try {
          var dark = localStorage.getItem("collatz-theme") === "dark";
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
          if (dark) {
            var icon = document.querySelector('link[rel="icon"]');
            var apple = document.querySelector('link[rel="apple-touch-icon"]');
            if (icon) icon.href = "/favicon-dark.svg";
            if (apple) apple.href = "/icon-dark.svg";
          }
        } catch (e) {}
      })();
    </script>
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
